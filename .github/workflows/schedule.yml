name: Paper-Slave Auto Radar

# 設定觸發條件
on:
  schedule:
    # 這裡使用 Cron 語法。設定為每週二早上 8:00 (台灣時間) 自動執行
    # 台灣是 UTC+8，所以這裡寫 0 0 * * 2 (UTC 的每週二 00:00)
    - cron: '0 0 * * 2'
  
  # 允許我們在 GitHub 網頁上手動點擊按鈕來測試！
  workflow_dispatch: 

jobs:
  run-radar:
    runs-on: ubuntu-latest # GitHub 會免費給你一台 Ubuntu 虛擬機

    steps:
      - name: 📥 下載最新程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 📦 安裝依賴套件
        run: pip install -r requirements.txt

      - name: 🚀 啟動 Paper-Slave 大腦與推播系統
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python main.py